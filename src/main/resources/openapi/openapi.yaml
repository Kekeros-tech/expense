openapi: 3.0.3
info:
  title: Finance API
  version: 1.0.0
servers:
  - url: http://localhost:8080

tags:
  - name: Accounts
    description: Service to work with accounts

paths:
  /accounts:
    get:
      tags: [ Accounts ]
      operationId: getAccounts
      summary: Get all accounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDto'
        '400':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDto'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDto'

components:

  schemas:
    AccountTypeEnum:
      type: string
      enum:
        - 'checking'
        - 'savings'
        - 'credit'
        - 'investment'

    AccountStatusEnum:
      type: string
      enum:
        - 'active'
        - 'frozen'
        - 'closed'

    AccountDto:
      type: object
      required:
        - id
        - name
        - type
        - balance
        - currency
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          $ref: '#/components/schemas/AccountTypeEnum'
        balance:
          type: integer
          format: int64
        currency:
          type: string
        status:
          $ref: '#/components/schemas/AccountStatusEnum'
        icon:
          type: string

    ErrorDto:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string