openapi: 3.0.3
info:
  title: Finance API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/expenses:
    get:
      tags:
        - Expenses
      summary: Get all expenses
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
components:
  schemas:
    Expense:
      type: object
      properties:
        id:
          type: integer
          format: int64
        amount:
          type: number